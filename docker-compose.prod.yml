##
## Supergate — Production Docker Compose
##
## Usage:
##   docker compose -f docker-compose.prod.yml up -d
##
## Requires a .env file at repo root with all variables from .env.production.example
##

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: supergate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-llm_gateway}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: supergate-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Applications ────────────────────────────────────────────────────────────

  gateway:
    image: ghcr.io/shivanshshekhar11/supergate-gateway:latest
    container_name: supergate-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-llm_gateway}
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m

  dashboard:
    image: ghcr.io/shivanshshekhar11/supergate-dashboard:latest
    container_name: supergate-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV:                   production
      NEXT_PUBLIC_GATEWAY_URL:    ${NEXT_PUBLIC_GATEWAY_URL}
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  docs:
    image: ghcr.io/shivanshshekhar11/supergate-docs:latest
    container_name: supergate-docs
    restart: unless-stopped
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: supergate-nginx
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - gateway
      - dashboard
      - docs
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64m

  # ── SSL (Certbot) ─────────────────────────────────────────────────────────
  # Run once to obtain cert:
  #   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
  #     --webroot -w /var/www/certbot -d YOUR_DOMAIN
  certbot:
    image: certbot/certbot
    container_name: supergate-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  certbot-www:
  certbot-certs:

networks:
  internal:
    driver: bridge
