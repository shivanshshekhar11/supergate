# Supergate — nginx reverse proxy
# Handles routing to dashboard (supergate.live), gateway (gateway.supergate.live), docs (docs.supergate.live)
# SSL termination via Certbot / Let's Encrypt (added post-deploy)

upstream gateway   { server gateway:3000; }
upstream dashboard { server dashboard:3001; }
upstream docs      { server docs:3002; }

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=web:10m rate=120r/m;

# ── HTTP → HTTPS redirect (uncomment after Certbot setup) ────────────────────
# server {
#     listen 80 default_server;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# ── Global settings ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml;

# ── Dashboard (supergate.live) ───────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;  # uncomment after Certbot
    server_name supergate.live www.supergate.live;

    # SSL certs (added by Certbot — do not edit manually)
    # ssl_certificate     /etc/letsencrypt/live/supergate.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/supergate.live/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        limit_req zone=web burst=30 nodelay;

        proxy_pass         http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Gateway API (gateway.supergate.live) ───────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;  # uncomment after Certbot
    server_name gateway.supergate.live;

    # SSL certs (added by Certbot — do not edit manually)
    # ssl_certificate     /etc/letsencrypt/live/supergate.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/supergate.live/privkey.pem;
    
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff"      always;

    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://gateway;
        proxy_http_version 1.1;

        # SSE / streaming support
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── Subdomain for Docs Site (docs.supergate.live) ──────────────────────────
server {
    listen 80;
    # listen 443 ssl;  # uncomment after Certbot
    server_name docs.supergate.live;

    # SSL certs (added by Certbot — do not edit manually)
    # ssl_certificate     /etc/letsencrypt/live/supergate.live/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/supergate.live/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        limit_req zone=web burst=30 nodelay;

        proxy_pass         http://docs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
