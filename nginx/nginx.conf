# Supergate — nginx reverse proxy
# Handles routing to gateway (:3000), dashboard (:3001), docs (:3002)
# SSL termination via Certbot / Let's Encrypt (added post-deploy)

upstream gateway   { server gateway:3000; }
upstream dashboard { server dashboard:3001; }
upstream docs      { server docs:3002; }

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=web:10m rate=120r/m;

# ── HTTP → HTTPS redirect (uncomment after Certbot setup) ────────────────────
# server {
#     listen 80;
#     server_name YOUR_DOMAIN www.YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl;  # uncomment after Certbot
    server_name _;    # replace with your domain after DNS is set

    # SSL certs (added by Certbot — do not edit manually)
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    # ── Gateway API (/v1/*, /health, /docs) ───────────────────────────────────
    location ~ ^/(v1|health|docs)(/|$) {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://gateway;
        proxy_http_version 1.1;

        # SSE / streaming support
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Docs site (/docs-site/*) ──────────────────────────────────────────────
    location /docs-site/ {
        limit_req zone=web burst=30 nodelay;

        rewrite ^/docs-site/(.*) /$1 break;
        proxy_pass         http://docs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dashboard (everything else) ───────────────────────────────────────────
    location / {
        limit_req zone=web burst=30 nodelay;

        proxy_pass         http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
