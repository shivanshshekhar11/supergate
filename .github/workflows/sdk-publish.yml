name: Publish @supergate/sdk

on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk/**'
      - 'packages/schemas/**'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build schemas (dependency)
        run: pnpm --filter @llm-gateway/schemas build

      - name: Build SDK
        run: pnpm --filter @supergate/sdk build

      - name: Type check
        run: pnpm --filter @supergate/sdk lint

      - name: Check version is not already published
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if npm view @supergate/sdk@$PACKAGE_VERSION version 2>/dev/null; then            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        run: pnpm --filter @supergate/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
