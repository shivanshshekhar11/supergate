name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  # Replace with your lowercase GitHub username if different
  OWNER: shivanshshekhar11 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Gateway ────────────────────────────────────────────────────────────
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/supergate-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Dashboard ──────────────────────────────────────────────────────────
      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/supergate-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=${{ vars.NEXT_PUBLIC_GATEWAY_URL }}
            NEXT_PUBLIC_DOCS_URL=${{ vars.NEXT_PUBLIC_DOCS_URL }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}

      # ── Docs ───────────────────────────────────────────────────────────────
      - name: Build and push Docs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/docs/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/supergate-docs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_DASHBOARD_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            # 1. Navigate to the project directory
            cd ~/projects/supergate
            
            # 2. Pull the latest code (for docker-compose changes)
            git pull origin main
            
            # 3. Pull the fresh images from GHCR
            docker compose -f docker-compose.prod.yml pull
            
            # 4. Restart containers
            docker compose -f docker-compose.prod.yml up -d
            
            # 5. Clean up old dangling images to save disk space
            docker image prune -f
